<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Tag HTML</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag deverá ultilizar em cada caso.
    </p>
    <ul>
        <li><abbr title="use a tag <p>">paragrafos</abbr></li>
        <li><abbr title="use a tag <h1..<h6>">títulos</abbr></li>
        <li><abbr title="use a tag <img>">imagens</abbr></li>
        <li><abbr title="use a tag <a>">Abreviações</abbr></li>
        <li><abbr title="use a tag <code>">Codigo-fonte</abbr></li>
        <li><abbr title="use a tag <ol> e <li>">Listas numeradas</abbr></li>
        <li><abbr title="use a tag <ul> e <li>">Listas com demarcadores</abbr></li>
    </ul>
</body>
</html>
