<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    
    <style>
        /* Seletores personalizados
                #  = ID
                .  = Class
                :  = pseudoclass
                :: = pseudoelement
                >  = children (filho)
        */
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: antiquewhite;
        }
        a{
            color: rgb(83, 0, 0);
            text-decoration: none; /* tira o sublinhado*/
            
        }
        a:visited{ /*Muda a cor se ja foi visitado*/
            color: chartreuse;
        }
        a:hover{ /* fica colorido quando passa mouse em cima*/
            text-decoration: none;
            color: rgb(17, 1, 87);
        }
        a:active{ /* quando clica ele muda a cor (durante o click*/
            color: rgb(211, 201, 59);
        }
        a::after{
            content: '[aqui, depois]';
            color: blue;
            text-decoration: underline;/* coloca o sublinhado */
            font-weight: unset;
        }
        a::before{
             content: '[add qualquer coisa aqui antes]';
            color: blue;
            text-decoration: underline;/* coloca o sublinhado */
            font-weight: unset;
        }
        .especial{
            background-color: rgba(133, 26, 40, 0.781);
            color: black;
        }
        .especial::after{
            content: '✧';
            text-decoration: none;
            color: black;
        
        }
        .especial::before{
            content: '✧';
            text-decoration: none;
            color: black;
        }
            
    </style>
</head>
<body>
    <h1>Personalizando links</h1>
    <ul>
        <li>
            <a href="https://www.google.com.br" target="_blank">Repositorio</a></li>
        <li>
            <a href="https://www.google.com.br" target="_blank" class="especial">canal youtube</a></li>
        <li>
            <a href="https://www.google.com.br" target="_blank">site de Curso</a></li>
    </ul>
</body>
</html>
