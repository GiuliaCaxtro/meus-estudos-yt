<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos de Caixa</title>
    <style>
        /* adiciona um display:inline ou block, ou inline-block*/
        h1{ /*box level*/
            text-align: center;
            background-color: rgba(165, 42, 42, 0.644);
            height:160px;
            width: 200px;

            border-width: 10px;
            border-style: solid;
            border-color: blue;
            /* border; 10px solid blue */

            padding-top: 12px;
            padding-right: 12px;
            padding-bottom: 12px;
            padding-left: 12px;
             /* padding; 12px 12px 12px 12px ou se forem numero s iguais usa apenas padding:12px */

            margin-top: 20px;
            margin-right: 20px;
            margin-bottom: 43px;
            margin-left: 20px;
             /* margin; 20px 20px 43px 20px ou margin; auto e escolhe o lado*/

            outline-width: 5px;
            outline-style:dashed;
            outline-color: aqua;
             /* outline; 5px dashed aqua*/
        }
        a{ /*inline level*/
           background-color: rgba(165, 42, 42, 0.644);
            height:300px;
            width: 300px;
            border-width: 15px;
            border-style: solid;
            border-color: blue; 
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa Box level</h1>
    <p>paragrafos também são exemplo de box level, mas os <a href="#">links são exemplos de caixas inline-level</a> vamos ver como tudo isso funciona!</p>

</body>
</html>
