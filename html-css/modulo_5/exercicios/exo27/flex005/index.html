<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexbox centralizado</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-color: rgb(255, 255, 255);
        }
        main{
            background-color: blue;
            height: 100vh;
            width: 100vw;

            display: flex;
            flex-flow: row nowrap;
            justify-content: center;
            align-items: center;

        }
        section{
            background-color: rgb(235, 184, 184);
            width: 200px;
            height: 200px;
        }
    </style>
</head>
<body>
    <main>
        <main>
            <section>
                <h1>Tela de Login</h1>
            </section>
        </main>
    </main>
</body>
</html>
