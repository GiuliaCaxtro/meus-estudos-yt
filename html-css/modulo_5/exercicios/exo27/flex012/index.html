<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexbox itens</title>
    <style>
        .container {
            background-color: rgb(0, 4, 255);
            display: flex;
            flex-flow: row nowrap;
          
        }

        .item {
            background-color: rgb(42, 145, 131);
            border: 1px solid #000;
            text-align: center;
            color: aliceblue;
            

        }
        #a{
            /*flex-shrink: 0;
            flex-grow: 1;
            flex-basis: 200px;*/

            flex: 0 1 200px;
        }
        #b{
            /*flex-shrink: 1;
            flex-grow: 1;
            flex-basis: 200px;*/

            flex: 1 1 200px;
        }
        #c{
            /*flex-shrink: 3;
            flex-grow: 1;
            flex-basis: 200px;*/

            flex: 3 1 200px;
        }

        /*flex: 0 1 auto; é o valor padrão do flex, ou seja, se não for declarado, é isso que o item vai assumir. 
        e pode serusado    flex:initial;    que significa a mesma coisa*/

        /*flex: 1 1 auto; é o valor padrão do flex, ou seja, se não for declarado, é isso que o item vai assumir. 
        pode ser usado     flex: auto;     que significa a mesma coisa*/
        
        /*flex: 0 0 auto; é o valor padrão do flex, ou seja, se não for declarado, é isso que o item vai assumir.
        pode ser usado     flex: none;     que significa a mesma coisa*/

    </style>
</head>
<body>
    <div class="container">
        <div class="item" id="a">A</div>
        <div class="item" id="b">OUTRO CONTEUDO</div>
        <div class="item" id="c">C</div>
        
        
    </div>

</body>
</html>
