<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexbox itens</title>
    <style>
        .container {
            background-color: rgb(0, 4, 255);
            display: flex;
            flex-flow: row wrap;
            
        }

        .item {
            background-color: rgb(42, 145, 131);
            border: 1px solid #000;
            text-align: center;
            color: aliceblue;
            padding: 40px;

        }

        #i1{
            order: 0;
        }
        #i2{
            order: -2;
        }
        #i3{
            order: 4;
        }
        #i4{
            order: 8;
        }
        #i5{
            order: 2;
        }
        #i6{
            order: 0;
        }
        #i7{
            order: -4;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="item" id="i1">A</div>
        <div class="item" id="i2">B</div>
        <div class="item" id="i3">C</div>
        <div class="item" id="i4">D</div>
        <div class="item" id="i5">E</div>
        <div class="item" id="i6">F</div>
        <div class="item" id="i7">G</div>
        
        
    </div>

</body>
</html>
