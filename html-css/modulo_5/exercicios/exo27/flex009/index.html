<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexbox itens</title>
    <style>
        .container {
            background-color: rgb(0, 4, 255);
            display: flex;
            flex-flow: row nowrap;
            
            
        }

        .item {
            background-color: rgb(42, 145, 131);
            border: 1px solid #000;
            text-align: center;
            color: aliceblue;
            padding: 40px;

            flex-basis: 150px;

        }


    </style>
</head>
<body>
    <div class="container">
        <div class="item" >A</div>
        <div class="item" >OUTRO CONTEUDO</div>
        <div class="item" >C</div>
        <div class="item" >D</div>
        <div class="item" >E</div>
        <div class="item" >CONTEUDO AINDA MAIOR PARA OCUPAR MAIS ESPAÇO</div>
        <div class="item" >G</div>
        
        
    </div>

</body>
</html>
