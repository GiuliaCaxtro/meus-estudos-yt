<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexbox</title>
    <style>
        .container {
            background-color: rgb(0, 4, 255);
            display: flex;
            flex-direction: row;
            gap: 5px;
        }

        .item {
            background-color: rgb(42, 145, 131);
            border: 1px solid #000;
            text-align: center;
            color: aliceblue;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
    </div>

</body>
</html>
