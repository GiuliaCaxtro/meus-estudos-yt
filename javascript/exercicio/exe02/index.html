<!DOCTYPE html>

<body>
    <header>
        <h1>Verificador de Idade</h1>
    </header>
    <section>
        <div>
            <p>Ano de nascimento:
                <input type="number" id="txtano" placeholder="Ano de nascimento" min="0">
            </p>
            <br>
            <p>Sexo:
                <input type="radio" name="sexo" id="masc" value="masculino">
                <label for="masc">Masculino</label>

                <input type="radio" name="sexo" id="fem" value="feminino">
                <label for="fem">Feminino</label>
            </p>
            <br>
            <p>
                <button onclick="verificar()">Verificar</button>
            </p>
            <br>
        </div>

        <div id="resultado">
            Preencha os dados acima para o resultado!
        </div>
        
    </section>
