<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Carrinho</title>
</head>
<body>

<h1>🛒 Carrinho de Compras</h1>

<input id="nome" placeholder="Nome do produto">
<input id="preco" type="number" placeholder="Preço">
<button onclick="adicionar()">Adicionar</button>                   
<hr>

<div id="lista"></div>
<h3 id="total">Total: R$ 0</h3>

<script>

let soma = 0 // 🔥 fica FORA da função

function adicionar() {

  let nome = document.getElementById("nome").value
  let preco = Number(document.getElementById("preco").value)

  let lista = document.getElementById("lista")
  let total = document.getElementById("total")

  // adiciona produto na tela
  lista.innerHTML += `<p>Produto: ${nome} - R$ ${preco}</p>`

  // soma os valores
  soma += preco

  // atualiza total
  total.innerHTML = `Total: R$ ${soma}`

  // limpa os inputs
  document.getElementById("nome").value = ""
  document.getElementById("preco").value = ""
}

</script>

</body>
</html>
